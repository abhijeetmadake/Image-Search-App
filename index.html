<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"> <!-- Defines character encoding as UTF-8 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Ensures responsiveness on all devices -->
    <title>Image Search App</title> <!-- Sets the page title -->
    <link rel="stylesheet" href="styles.css"> <!-- Links the external CSS file -->
</head>
<body>
    <h1>Image Search App</h1> <!-- Main heading -->

    <!-- Form for searching images -->
    <form>
        <input type="text" id="search-input" placeholder="Search for images" /> <!-- Text input field for search -->
        <button id="search-button" type="submit">Search</button> <!-- Button to trigger the search -->
    </form>

    <!-- Container where search results will be displayed -->
    <div class="search-results"></div>

    <!-- Button to load more images -->
    <button id="show-more-button" style="display:none;">Show more</button>

    <script src="app.js"></script> <!-- Links the JavaScript file -->
</body>
</html>
